services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_NAME:-expense_tracker}"
      MYSQL_USER: "${DB_USER:-tracker}"
      MYSQL_PASSWORD: "${DB_PASS}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Run migrations then start the server
    command: sh -c "node backend/db/migrate.js && node backend/server.js"
    env_file: backend/.env
    environment:
      DB_HOST: db
    volumes:
      - ./backend:/app/backend
    expose:
      - "5000"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-3000}:80"

volumes:
  mysql_data:
